<template>
    <div class="vc-cockpit-root">
        <header class="vc-header">
            <div class="vc-shell vc-header-inner">
                <div>
                    <span class="vc-eyebrow">{labels.eyebrow}</span>
                    <h1 class="vc-title">{labels.title}</h1>
                    <p class="vc-subtitle">{labels.subtitle}</p>
                </div>
                <lightning-combobox
                    name="period"
                    label={labels.period}
                    value={period}
                    options={periodOptions}
                    variant="label-hidden"
                    onchange={handlePeriodChange}
                    class="vc-period-selector">
                </lightning-combobox>
            </div>
        </header>

        <div class="vc-shell">
            <section class="vc-section">
                <c-vc-kpi-strip period={period} refresh-key={refreshKey}></c-vc-kpi-strip>
            </section>

            <section class="vc-section">
                <div class="vc-row vc-row_two">
                    <c-vc-action-queue
                        period={period}
                        refresh-key={refreshKey}
                        queue-type="missing-reports"
                        title={labels.missingReportsTitle}
                        empty-message={labels.missingReportsEmpty}
                        onopenvisit={handleOpenVisit}>
                    </c-vc-action-queue>
                    <c-vc-action-queue
                        period={period}
                        refresh-key={refreshKey}
                        queue-type="missing-plans"
                        title={labels.missingPlansTitle}
                        empty-message={labels.missingPlansEmpty}
                        onopenvisit={handleOpenVisit}>
                    </c-vc-action-queue>
                </div>
            </section>

            <section class="vc-section">
                <c-vc-analytics period={period} refresh-key={refreshKey}></c-vc-analytics>
            </section>

            <section class="vc-section">
                <c-vc-recent-visits
                    period={period}
                    refresh-key={refreshKey}
                    onopenvisit={handleOpenVisit}>
                </c-vc-recent-visits>
            </section>

            <template if:true={drawerOpen}>
                <div class="vc-drawer">
                    <c-vc-visit-detail
                        visit-id={selectedVisitId}
                        onclose={handleCloseDrawer}
                        onvisitupdated={handleVisitUpdated}>
                    </c-vc-visit-detail>
                </div>
            </template>
        </div>
    </div>
</template>
