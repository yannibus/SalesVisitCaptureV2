<template>
    <article class="vc-recent-card">
        <header class="vc-recent-header">
            <h2 class="vc-recent-title">{labels.title}</h2>
            <span class="vc-muted">{labels.subtitle}</span>
        </header>
        <div>
            <template if:true={hasVisits}>
                <table class="vc-table">
                    <thead>
                        <tr>
                            <th>{labels.colDate}</th>
                            <th>{labels.colAccount}</th>
                            <th>{labels.colContact}</th>
                            <th>{labels.colSource}</th>
                            <th>{labels.colReport}</th>
                            <th>{labels.colPlan}</th>
                            <th>{labels.colLanguage}</th>
                            <th class="vc-action-col"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={rows} for:item="r">
                            <tr key={r.id}>
                                <td>{r.dateLabel}</td>
                                <td class="vc-col-strong">{r.accountName}</td>
                                <td>{r.contactName}</td>
                                <td><span class={r.sourceBadgeClass}>{r.source}</span></td>
                                <td><span class={r.reportBadgeClass} title={r.reportLabel}>{r.reportStatus}</span></td>
                                <td><span class={r.planBadgeClass} title={r.planLabel}>{r.planStatus}</span></td>
                                <td class="vc-col-lang">{r.language}</td>
                                <td class="vc-action-col">
                                    <button class="slds-button slds-button_neutral vc-row-button" data-id={r.id} onclick={handleOpen}>{labels.open}</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>
            <template if:false={hasVisits}>
                <p class="vc-empty">{labels.empty}</p>
            </template>
        </div>
    </article>
</template>
